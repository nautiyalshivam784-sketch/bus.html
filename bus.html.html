<!DOCTYPE html>
<html>
<head>
    <title>digitalfleet</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 20px;
        }
        .font{
            font-family:Roman times;
        }
        h1, h3 { color: #ffffff; }
        input, button {
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #1f6feb;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #0053ba; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #444;
            padding: 10px;
        }
        th { background-color: #1f1f1f; }
        tr:nth-child(even) { background-color: #1a1a1a; }
        tr:hover { background-color: #333; }
        .section { margin-bottom: 30px; }
    </style>
</head>

<body>
<h1 style="font-family:Roman Times";>DIGITAL BUS FLEET</h1>

<div class="section">
    <h3 id="font">Search by Bus Number</h3>
    <input id="bus_no" placeholder="Enter Bus Number">
    <button onclick="searchBus()">Search</button>
    <div id="bus_result"></div>
</div>

<div class="section">
    <h3 id="font">Search by Pickup Location</h3>
    <!-- 🔥 LIVE SEARCH -->
    <input id="pickup_loc" placeholder="Enter Pickup Location" oninput="searchPickup()">
    <button onclick="searchPickup()">Search</button>
    <div id="pickup_result"></div>
</div>

<div class="section">
    <h3 id="font">Add New Bus</h3>
    <input id="new_bus_no" placeholder="Bus No">
    <input id="new_time" placeholder="Time">
    <input id="new_pickup" placeholder="Pickup">
    <input id="new_drop" placeholder="Drop">
    <button onclick="addBus()">Add Bus</button>
    <div id="add_result"></div>
</div>

<div class="section">
    <h3>All Buses</h3>
    <button onclick="displayAll()">Show All Buses</button>
    <div id="all_buses"></div>
</div>

<script>
const API = "http://127.0.0.1:5000/api";

// ✅ ENTER KEY SUPPORT
document.getElementById("bus_no").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        searchBus();
    }
});

document.getElementById("pickup_loc").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        searchPickup();
    }
});

// 🔹 Show All
function displayAll() {
    fetch(`${API}/buses`)
    .then(res => res.json())
    .then(data => {
        let html = "<table><tr><th>Bus No</th><th>Time</th><th>Pickup</th><th>Drop</th></tr>";
        data.forEach(b => {
            html += `<tr><td>${b.bus_no}</td><td>${b.time}</td><td>${b.pickup}</td><td>${b.drop}</td></tr>`;
        });
        html += "</table>";
        document.getElementById("all_buses").innerHTML = html;
    });
}

// 🔹 Search by Bus No
function searchBus() {
    const bus_no = document.getElementById("bus_no").value.trim();

    if (bus_no === "") return;

    fetch(`${API}/buses/${bus_no}`)
    .then(res => res.json())
    .then(b => {
        if (b.error) {
            document.getElementById("bus_result").innerText = b.error;
        } else {
            document.getElementById("bus_result").innerHTML =
            `<table>
                <tr><th>Bus No</th><th>Time</th><th>Pickup</th><th>Drop</th></tr>
                <tr>
                    <td>${b.bus_no}</td>
                    <td>${b.time}</td>
                    <td>${b.pickup}</td>
                    <td>${b.drop}</td>
                </tr>
            </table>`;
        }
    });
}

// 🔹 Search by Pickup (🔥 LIVE + FIXED)
function searchPickup() {
    const pickup = document.getElementById("pickup_loc").value.trim();

    if (pickup === "") {
        document.getElementById("pickup_result").innerHTML = "";
        return;
    }

    fetch(`${API}/buses/pickup/${pickup}`)
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("pickup_result").innerText = "No buses found";
            return;
        }

        let html = "<table><tr><th>Bus No</th><th>Time</th><th>Pickup</th><th>Drop</th></tr>";
        data.forEach(b => {
            html += `<tr>
                        <td>${b.bus_no}</td>
                        <td>${b.time}</td>
                        <td>${b.pickup}</td>
                        <td>${b.drop}</td>
                     </tr>`;
        });

        html += "</table>";
        document.getElementById("pickup_result").innerHTML = html;
    });
}

// 🔹 Add Bus
function addBus() {
    fetch(`${API}/buses`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            bus_no: document.getElementById("new_bus_no").value,
            time: document.getElementById("new_time").value,
            pickup: document.getElementById("new_pickup").value,
            drop: document.getElementById("new_drop").value
        })
    })
    .then(res => res.json())
    .then(d => {
        document.getElementById("add_result").innerText = d.message || d.error;
        displayAll();
    });
}
</script>

</body>
</html>
