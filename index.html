<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Prediction</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.container{
background:white;padding:30px;border-radius:15px;
width:90%;max-width:700px;
}
h1{text-align:center;margin-bottom:10px;}
.subtitle{text-align:center;color:#666;margin-bottom:20px;}

input,button{
width:100%;padding:10px;margin-top:10px;
border-radius:8px;border:1px solid #ddd;
}

button{
background:#667eea;color:white;border:none;
cursor:pointer;font-weight:bold;
}

.hidden{display:none;}

.sem-block{
background:#f5f5f5;padding:10px;margin:10px 0;border-radius:10px;
}
.prediction-grid{
display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.prediction-card{
background:#eee;padding:10px;border-radius:10px;text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div id="step1">
<h1>🎓 Predictor</h1>
<p class="subtitle">Enter number of semesters</p>

<input type="number" id="semCount" min="1" max="7" value="1">
<button onclick="proceedToStep2()">Continue</button>
</div>

<div id="step2" class="hidden">
<button onclick="backToStep1()">⬅ Back</button>
<h1>Enter Data</h1>

<div id="semInputs"></div>

<button onclick="predictResults()">Predict</button>
</div>

<div id="results" class="hidden">
<button onclick="backToStep1()">⬅ Restart</button>

<h1>Results</h1>

<div class="prediction-grid">
<div class="prediction-card">
<h3>SGPA</h3>
<p id="predGpa"></p>
</div>

<div class="prediction-card">
<h3>Attendance</h3>
<p id="predAtt"></p>
</div>

<div class="prediction-card">
<h3>Study</h3>
<p id="predStudy"></p>
</div>

<div class="prediction-card">
<h3>Sleep</h3>
<p id="predSleep"></p>
</div>
</div>

<div id="alerts"></div>
<div id="trend"></div>
<div id="correlation"></div>
<div id="suggestion"></div>

</div>

</div>

<script>

let selectedSemesters=0;

function proceedToStep2(){
selectedSemesters=parseInt(document.getElementById('semCount').value);

document.getElementById('step1').classList.add('hidden');
document.getElementById('step2').classList.remove('hidden');

generateInputs();
}

function backToStep1(){
location.reload();
}

function generateInputs(){
let html='';
for(let i=1;i<=selectedSemesters;i++){
html+=`
<div class="sem-block">
<h4>Semester ${i}</h4>
<input id="sgpa${i}" placeholder="SGPA">
<input id="att${i}" placeholder="Attendance">
<input id="study${i}" placeholder="Study Hours">
<input id="sleep${i}" placeholder="Sleep Hours">
</div>`;
}
document.getElementById('semInputs').innerHTML=html;
}

function predictResults(){

let sgpa=[],att=[],study=[],sleep=[];

for(let i=1;i<=selectedSemesters;i++){
sgpa.push(parseFloat(document.getElementById('sgpa'+i).value)||0);
att.push(parseFloat(document.getElementById('att'+i).value)||0);
study.push(parseFloat(document.getElementById('study'+i).value)||0);
sleep.push(parseFloat(document.getElementById('sleep'+i).value)||0);
}

fetch('/predict-manual',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({sgpa,att,study,sleep})
})
.then(res=>res.json())
.then(data=>displayResults(data));

}

function displayResults(data){

let p=data.prediction;

// FIXED mapping (backend compatible)
document.getElementById('predGpa').innerText=p.sgpa || 0;
document.getElementById('predAtt').innerText=p.attendance || 0;
document.getElementById('predStudy').innerText=p.study_hours || 0;
document.getElementById('predSleep').innerText=p.sleep_hours || 0;

// ALERTS
let alertHtml='';
if(data.alerts){
data.alerts.forEach(a=>{
alertHtml+=`<p>${a.message}</p>`;
});
}
document.getElementById('alerts').innerHTML=alertHtml;

// TRENDS
let t='';
if(data.downward_trends && data.downward_trends.sgpa && data.downward_trends.sgpa.is_downward) t+='SGPA ↓<br>';
if(data.downward_trends && data.downward_trends.attendance && data.downward_trends.attendance.is_downward) t+='Attendance ↓<br>';
if(data.downward_trends && data.downward_trends.study_hours && data.downward_trends.study_hours.is_downward) t+='Study ↓<br>';
if(data.downward_trends && data.downward_trends.sleep_hours && data.downward_trends.sleep_hours.is_downward) t+='Sleep ↓<br>';

document.getElementById('trend').innerHTML=t;

// CORRELATION
let c=data.correlations || {};
document.getElementById('correlation').innerHTML=
`Attendance: ${c.attendance || 0}<br>
Study: ${c.study_hours || 0}<br>
Sleep: ${c.sleep_hours || 0}`;

// SUGGESTION
document.getElementById('suggestion').innerText=data.improvement_suggestion || "";

// SWITCH UI
document.getElementById('step2').classList.add('hidden');
document.getElementById('results').classList.remove('hidden');

}

</script>

</body>
</html>
